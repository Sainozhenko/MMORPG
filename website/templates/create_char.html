{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 80px auto; background: rgba(0,0,0,0.9); padding: 40px; border: 1px solid #f1c40f; border-radius: 5px; text-align: center;">
    <h2 style="color: #f1c40f; text-transform: uppercase; letter-spacing: 2px;">Создание героя</h2>
    
    <form method="post" style="margin-top: 30px;">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="color: #fff; display: block; margin-bottom: 10px;">Введите имя персонажа:</label>
            <input type="text" name="name" required placeholder="NICKNAME" 
                   style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #f1c40f; text-align: center; font-weight: bold; font-size: 18px;">
        </div>
        
        <button type="submit" style="width: 100%; background: #f1c40f; color: #000; padding: 15px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase;">
            ПОДТВЕРДИТЬ
        </button>
    </form>
    
    <br>
    <a href="{% url 'profile' %}" style="color: #666; text-decoration: none; font-size: 13px;">← Вернуться назад</a>
</div>
{% endblock %}
