{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; background: rgba(0,0,0,0.9); padding: 40px; border: 1px solid #f1c40f; border-radius: 5px; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);">
    <h2 style="color: #f1c40f; text-align: center; text-transform: uppercase; letter-spacing: 2px;">Вход в аккаунт</h2>
    
    <form method="post" style="margin-top: 25px;">
        {% csrf_token %}
        
        {% if form.errors %}
            <p style="color: #e74c3c; background: rgba(231, 76, 60, 0.1); padding: 10px; border-radius: 3px; font-size: 14px;">
                Неверный логин или пароль. Попробуйте снова.
            </p>
        {% endif %}

        <div style="margin-bottom: 15px; color: #fff;">
            {{ form.as_p }}
        </div>

        <button type="submit" style="width: 100%; background: #f1c40f; color: #000; padding: 12px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
            Войти в кабинет
        </button>
    </form>

    <div style="margin-top: 20px; text-align: center; color: #888; font-size: 14px;">
        Нет аккаунта? <a href="{% url 'register' %}" style="color: #f1c40f; text-decoration: none;">Создать сейчас</a>
    </div>
</div>

<style>
    /* Делаем стандартные поля Django красивыми */
    form p label { display: block; margin-bottom: 5px; color: #f1c40f; }
    form p input { 
        width: 100%; 
        padding: 10px; 
        background: #111; 
        border: 1px solid #333; 
        color: #fff; 
        box-sizing: border-box;
    }
    form p input:focus { border-color: #f1c40f; outline: none; }
    button:hover { background: #fff !important; }
</style>
{% endblock %}
